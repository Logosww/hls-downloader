name: Setup pnpm
description: Install Node via actions/setup-node, then pnpm via pnpm/action-setup@v6

inputs:
  version:
    description: pnpm version
    required: false
    default: latest
  node-version:
    description: Node.js version for subsequent workflow steps
    required: false
    default: '24'
  cache:
    description: Cache pnpm store
    required: false
    default: 'true'
  install:
    description: Run pnpm install after setup
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.version }}
        cache: ${{ inputs.cache }}
        run_install: ${{ inputs.install }}
