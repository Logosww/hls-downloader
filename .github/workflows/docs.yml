name: Deploy Docs

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          VITEPRESS_BASE: /hls-downloader/
        working-directory: docs
        run: pnpm exec vitepress build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
