name: Deploy Docs

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # 与根 CI 相同：vcpkg 固定到含 FFmpeg 8.1 的 commit
  VCPKG_TAG: '03b9ab95fd5ea1425427ccde11d13e92aa91bf51'
  HLS_FFMPEG_STATIC: '1'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          cache: pnpm

      - name: Install vcpkg host dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build git curl zip unzip tar pkg-config clang libclang-dev nasm libssl-dev

      # actions/cache does not expand ~ reliably; path must match Node os.homedir()/vcpkg.
      - name: Resolve VCPKG_ROOT (Linux)
        id: vcpkg_root
        shell: bash
        run: |
          R="${HOME}/vcpkg"
          echo "root=$R" >> "$GITHUB_OUTPUT"
          echo "VCPKG_ROOT=$R" >> "$GITHUB_ENV"

      - name: Cache vcpkg (Linux)
        uses: actions/cache@v4
        with:
          path: ${{ steps.vcpkg_root.outputs.root }}
          key: vcpkg-ff81-docs-Linux-x64-linux-${{ env.VCPKG_TAG }}
          restore-keys: |
            vcpkg-ff81-docs-Linux-x64-linux-

      - name: Setup vcpkg + static FFmpeg (Linux x64)
        run: node scripts/setup-vcpkg-ffmpeg.ts x64-linux

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/adapters/src/rust -> target

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Build docs
        env:
          VITEPRESS_BASE: /hls-downloader/
        working-directory: docs
        run: pnpm exec vitepress build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
