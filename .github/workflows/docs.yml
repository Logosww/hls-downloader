name: Deploy Docs

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PNPM_VERSION: latest
  JS_RUNTIME: node@24

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/setup@v1
        with:
          version: ${{ env.PNPM_VERSION }}
          runtime: ${{ env.JS_RUNTIME }}
          cache: true
          install: false

      - run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          VITEPRESS_BASE: /hls-downloader/
        working-directory: docs
        run: pnpm exec vitepress build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # 勿在此 job 使用 environment: github-pages：该环境默认常限制为仅 default branch，
  # 而本 workflow 由 tag v* 触发，会报 “Tag vX is not allowed … environment protection rules”。
  # deploy-pages 仅需 pages + id-token 权限即可部署。
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
