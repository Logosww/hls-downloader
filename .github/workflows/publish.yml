name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-adapters-native:
    name: Build adapters native (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    env:
      FFMPEG_LIBAVCODEC_MIN_MAJOR: '60'
      FFMPEG_LIBAVCODEC_MAX_MAJOR: '62'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: darwin-x64
            os: macos-15-intel
          - name: darwin-arm64
            os: macos-14
          - name: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          cache: pnpm

      - name: Install FFmpeg system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang \
            ffmpeg \
            libavutil-dev libavcodec-dev libavformat-dev \
            libavfilter-dev libavdevice-dev \
            libswscale-dev libswresample-dev

      - name: Install FFmpeg system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config ffmpeg

      - name: Cache FFmpeg (Windows, BtbN extract)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\ffmpeg-win-dev
          key: ${{ runner.os }}-ffmpeg-btbn-n81-lgpl-shared-v1

      - name: Setup FFmpeg + LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install llvm pkgconfiglite -y --no-progress
          $llvmBin = 'C:\Program Files\LLVM\bin'
          $chocoBin = 'C:\ProgramData\chocolatey\bin'
          if (-not (Test-Path (Join-Path $llvmBin 'clang.exe'))) { throw "clang.exe not found under $llvmBin" }
          $pkgConfigExe = Join-Path $chocoBin 'pkg-config.exe'
          if (-not (Test-Path $pkgConfigExe)) { throw "pkg-config.exe not found under $chocoBin" }

          $destRoot = 'C:\Users\runneradmin\ffmpeg-win-dev'
          New-Item -ItemType Directory -Force -Path $destRoot | Out-Null
          $pcFile = Get-ChildItem -Path $destRoot -Recurse -Filter 'libavcodec.pc' -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pcFile) {
            $url = 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-lgpl-shared-8.1.zip'
            $zip = Join-Path $env:TEMP 'ffmpeg-btbn-n81-lgpl.zip'
            Write-Host 'Downloading FFmpeg (BtbN LGPL shared)…'
            Invoke-WebRequest -Uri $url -OutFile $zip
            Get-ChildItem $destRoot -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
            Expand-Archive -Path $zip -DestinationPath $destRoot -Force
            Remove-Item $zip -Force
            $pcFile = Get-ChildItem -Path $destRoot -Recurse -Filter 'libavcodec.pc' -File | Select-Object -First 1
            if (-not $pcFile) { throw 'libavcodec.pc not found after BtbN extract' }
          }
          $ffmpegRoot = $pcFile.Directory.Parent.Parent.FullName
          $ffExe = Join-Path $ffmpegRoot 'bin\ffmpeg.exe'
          if (-not (Test-Path $ffExe)) { throw "ffmpeg.exe not found at $ffExe" }
          $pcDir = Join-Path $ffmpegRoot 'lib\pkgconfig'
          Write-Host "FFmpeg root: $ffmpegRoot"

          "PKG_CONFIG=$pkgConfigExe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG_PATH=$pcDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          "FFMPEG_DIR=$ffmpegRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PATH=$ffmpegRoot\bin;$llvmBin;$chocoBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Log FFmpeg versions
        if: runner.os != 'Windows'
        run: |
          ffmpeg -version | head -n 1
          pkg-config --modversion libavcodec
          pkg-config --modversion libavformat

      - name: Log FFmpeg versions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:PKG_CONFIG" --modversion libavcodec
          & "$env:PKG_CONFIG" --modversion libavformat

      - name: Assert FFmpeg binding compatibility
        run: node scripts/assert-ffmpeg-version.ts

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/adapters/src/rust -> target

      - run: pnpm install --frozen-lockfile

      - name: Build native module
        run: pnpm --filter "@hls-downloader/adapters" run build:native

      - name: Upload native binaries
        uses: actions/upload-artifact@v4
        with:
          name: adapters-native-${{ matrix.name }}
          path: packages/adapters/src/rust/native.*.node
          if-no-files-found: error

  publish-rust-native:
    needs: build-adapters-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          pattern: adapters-native-*
          merge-multiple: true
          path: packages/adapters/src/rust

      - name: Prepare native platform packages
        run: |
          pnpm --filter "@hls-downloader/adapters" exec napi create-npm-dirs --cwd src/rust
          pnpm --filter "@hls-downloader/adapters" exec napi artifacts --cwd src/rust --output-dir . --npm-dir npm
          pnpm --filter "@hls-downloader/adapters" exec napi pre-publish --cwd src/rust --skip-optional-publish -t npm
          pnpm run adapters:inject-native-pkg-repository

      - name: Publish native platform packages
        run: |
          set -euo pipefail
          VER=$(node -p "require('./packages/adapters/package.json').version")
          TAG=$(node scripts/npm-dist-tag.ts)
          PUBLISH_EXTRA=()
          if [[ -n "$TAG" ]]; then
            PUBLISH_EXTRA=(--tag "$TAG")
            echo "Prerelease version ${VER}: publishing with --tag ${TAG}"
          fi
          for pkg in packages/adapters/src/rust/npm/*; do
            if ! ls "${pkg}"/*.node >/dev/null 2>&1; then
              echo "Skip ${pkg} (no .node artifact)"
              continue
            fi
            echo "Publishing ${pkg}"
            (cd "${pkg}" && pnpm publish --provenance --access public --no-git-checks "${PUBLISH_EXTRA[@]}")
          done

  publish:
    needs: publish-rust-native
    runs-on: ubuntu-latest
    env:
      FFMPEG_LIBAVCODEC_MIN_MAJOR: '60'
      FFMPEG_LIBAVCODEC_MAX_MAJOR: '62'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Log toolchain versions (Node built-in npm)
        run: |
          echo "Trusted Publishing needs npm >= 11.5.1; Node bundles npm 10.x — expect e.g. 10.9.4 here until upgrade step below."
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"

      - name: Install FFmpeg system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang \
            ffmpeg \
            libavutil-dev libavcodec-dev libavformat-dev \
            libavfilter-dev libavdevice-dev \
            libswscale-dev libswresample-dev

      - name: Log FFmpeg versions
        run: |
          ffmpeg -version | head -n 1
          pkg-config --modversion libavcodec
          pkg-config --modversion libavformat

      - name: Assert FFmpeg binding compatibility
        run: node scripts/assert-ffmpeg-version.ts

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/adapters/src/rust -> target

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Inject adapters optional native dependencies
        run: pnpm run adapters:inject-optional-deps

      - name: Log toolchain versions before publish
        run: |
          echo "After npm install -g — this must be >= 11.5.1 for OIDC:"
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"

      - name: Publish packages
        run: |
          set -euo pipefail
          VER=$(node -p "require('./packages/adapters/package.json').version")
          TAG=$(node scripts/npm-dist-tag.ts)
          PUBLISH_EXTRA=()
          if [[ -n "$TAG" ]]; then
            PUBLISH_EXTRA=(--tag "$TAG")
            echo "Prerelease version ${VER}: publishing with --tag ${TAG}"
          fi
          pnpm --filter "@hls-downloader/shared" publish --provenance --no-git-checks "${PUBLISH_EXTRA[@]}"
          pnpm --filter "@hls-downloader/core" publish --provenance --no-git-checks "${PUBLISH_EXTRA[@]}"
          pnpm --filter "@hls-downloader/adapters" publish --provenance --no-git-checks "${PUBLISH_EXTRA[@]}"
          pnpm publish --provenance --no-git-checks "${PUBLISH_EXTRA[@]}"
