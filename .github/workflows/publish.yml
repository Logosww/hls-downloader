name: Publish to npm

on:
  push:
    tags: ['v*']
  # 使用「最新已合并」的 workflow：在 Actions 里 Run workflow（选 main），不要用旧 run 的 Re-run（Re-run 固定用当时那次提交的 YAML）
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Log toolchain versions (Node built-in npm)
        run: |
          echo "Trusted Publishing needs npm >= 11.5.1; Node bundles npm 10.x — expect e.g. 10.9.4 here until upgrade step below."
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"

      - name: Install FFmpeg system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang \
            libavutil-dev libavcodec-dev libavformat-dev \
            libavfilter-dev libavdevice-dev \
            libswscale-dev libswresample-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/adapters/src/rust -> target

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@^11.5.1

      - name: Log toolchain versions before publish
        run: |
          echo "After npm install -g — this must be >= 11.5.1 for OIDC:"
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"

      - name: Publish packages
        run: |
          pnpm --filter "@hls-downloader/shared" publish --provenance --no-git-checks
          pnpm --filter "@hls-downloader/core" publish --provenance --no-git-checks
          pnpm --filter "@hls-downloader/adapters" publish --provenance --no-git-checks
          pnpm publish --provenance --no-git-checks
