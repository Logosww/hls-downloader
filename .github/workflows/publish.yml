name: Publish to npm

on:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Log toolchain versions
        run: |
          echo "Trusted Publishing: Node >= 22.14, npm >= 11.5.1 (see https://docs.npmjs.com/trusted-publishers)"
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"
          type npm 2>/dev/null || true

      - name: Install FFmpeg system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang \
            libavutil-dev libavcodec-dev libavformat-dev \
            libavfilter-dev libavdevice-dev \
            libswscale-dev libswresample-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/adapters/src/rust -> target

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Publish packages
        run: |
          pnpm --filter "@hls-downloader/shared" publish --provenance --no-git-checks
          pnpm --filter "@hls-downloader/core" publish --provenance --no-git-checks
          pnpm --filter "@hls-downloader/adapters" publish --provenance --no-git-checks
          pnpm publish --provenance --no-git-checks
