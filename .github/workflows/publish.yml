name: Publish to npm

on:
  push:
    tags: ['v*']
  # 使用「最新已合并」的 workflow：在 Actions 里 Run workflow（选 main），不要用旧 run 的 Re-run（Re-run 固定用当时那次提交的 YAML）
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-adapters-native:
    name: Build adapters native (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    env:
      FFMPEG_LIBAVCODEC_MIN_MAJOR: '60'
      FFMPEG_LIBAVCODEC_MAX_MAJOR: '62'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: darwin-x64
            os: macos-15-intel
          - name: darwin-arm64
            os: macos-14
          - name: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          cache: pnpm

      - name: Install FFmpeg system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang \
            ffmpeg \
            libavutil-dev libavcodec-dev libavformat-dev \
            libavfilter-dev libavdevice-dev \
            libswscale-dev libswresample-dev

      - name: Install FFmpeg system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config ffmpeg

      - name: Cache vcpkg artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\vcpkg\archives
            ~\vcpkg\installed
            ~\vcpkg\downloads
          key: ${{ runner.os }}-vcpkg-ffmpeg-x64-pkgconf-v1
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install FFmpeg build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "$env:USERPROFILE\vcpkg\.git")) {
            git clone https://github.com/microsoft/vcpkg "$env:USERPROFILE\vcpkg"
          } else {
            git -C "$env:USERPROFILE\vcpkg" fetch --depth=1 origin master
            git -C "$env:USERPROFILE\vcpkg" reset --hard origin/master
          }
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$env:USERPROFILE\vcpkg\vcpkg.exe" install ffmpeg:x64-windows pkgconf:x64-windows
          "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          "FFMPEG_DIR=$env:USERPROFILE\vcpkg\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG=$env:USERPROFILE\vcpkg\installed\x64-windows\tools\pkgconf\pkgconf.exe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG_PATH=$env:USERPROFILE\vcpkg\installed\x64-windows\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Log FFmpeg versions
        if: runner.os != 'Windows'
        run: |
          ffmpeg -version | head -n 1
          pkg-config --modversion libavcodec
          pkg-config --modversion libavformat

      - name: Log FFmpeg versions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:PKG_CONFIG" --modversion libavcodec
          & "$env:PKG_CONFIG" --modversion libavformat

      - name: Assert FFmpeg binding compatibility
        run: node scripts/assert-ffmpeg-version.ts

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/adapters/src/rust -> target

      - run: pnpm install --frozen-lockfile

      - name: Build native module
        run: pnpm --filter "@hls-downloader/adapters" run build:native

      - name: Upload native binaries
        uses: actions/upload-artifact@v4
        with:
          name: adapters-native-${{ matrix.name }}
          path: packages/adapters/src/rust/native.*.node
          if-no-files-found: error

  publish-rust-native:
    needs: build-adapters-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          pattern: adapters-native-*
          merge-multiple: true
          path: packages/adapters/src/rust

      - name: Prepare native platform packages
        run: |
          pnpm --filter "@hls-downloader/adapters" exec napi create-npm-dirs --cwd src/rust
          pnpm --filter "@hls-downloader/adapters" exec napi artifacts --cwd src/rust --output-dir . --npm-dir npm
          pnpm --filter "@hls-downloader/adapters" exec napi pre-publish --cwd src/rust --skip-optional-publish -t npm

      - name: Publish native platform packages
        run: |
          for pkg in packages/adapters/src/rust/npm/*; do
            if ! ls "${pkg}"/*.node >/dev/null 2>&1; then
              echo "Skip ${pkg} (no .node artifact)"
              continue
            fi
            echo "Publishing ${pkg}"
            (cd "${pkg}" && pnpm publish --provenance --access public --no-git-checks)
          done

  publish:
    needs: publish-rust-native
    runs-on: ubuntu-latest
    env:
      FFMPEG_LIBAVCODEC_MIN_MAJOR: '60'
      FFMPEG_LIBAVCODEC_MAX_MAJOR: '62'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Log toolchain versions (Node built-in npm)
        run: |
          echo "Trusted Publishing needs npm >= 11.5.1; Node bundles npm 10.x — expect e.g. 10.9.4 here until upgrade step below."
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"

      - name: Install FFmpeg system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang \
            ffmpeg \
            libavutil-dev libavcodec-dev libavformat-dev \
            libavfilter-dev libavdevice-dev \
            libswscale-dev libswresample-dev

      - name: Log FFmpeg versions
        run: |
          ffmpeg -version | head -n 1
          pkg-config --modversion libavcodec
          pkg-config --modversion libavformat

      - name: Assert FFmpeg binding compatibility
        run: node scripts/assert-ffmpeg-version.ts

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/adapters/src/rust -> target

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Inject adapters optional native dependencies
        run: pnpm run adapters:inject-optional-deps

      - name: Log toolchain versions before publish
        run: |
          echo "After npm install -g — this must be >= 11.5.1 for OIDC:"
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"

      - name: Publish packages
        run: |
          pnpm --filter "@hls-downloader/shared" publish --provenance --no-git-checks
          pnpm --filter "@hls-downloader/core" publish --provenance --no-git-checks
          pnpm --filter "@hls-downloader/adapters" publish --provenance --no-git-checks
          pnpm publish --provenance --no-git-checks
