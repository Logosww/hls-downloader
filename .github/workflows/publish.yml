name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish_scope:
        description: Publish scope
        required: true
        default: all
        type: choice
        options:
          - all
          - root-only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # microsoft/vcpkg：ports/ffmpeg 8.1；见 scripts/setup-vcpkg-ffmpeg.ts
  VCPKG_TAG: '03b9ab95fd5ea1425427ccde11d13e92aa91bf51'
  HLS_FFMPEG_STATIC: '1'

jobs:
  build-adapters-native:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
    name: Build adapters native (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      FFMPEG_LIBAVCODEC_MIN_MAJOR: '60'
      FFMPEG_LIBAVCODEC_MAX_MAJOR: '62'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            vcpkg_triplet: x64-linux
          - name: linux-arm64
            os: ubuntu-24.04-arm
            vcpkg_triplet: arm64-linux
          - name: darwin-x64
            os: macos-15-intel
            vcpkg_triplet: x64-osx
          - name: darwin-arm64
            os: macos-14
            vcpkg_triplet: arm64-osx
          - name: windows-x64
            os: windows-latest
            vcpkg_triplet: x64-windows-static-md
          - name: windows-arm64
            os: windows-11-arm
            vcpkg_triplet: arm64-windows-static-md
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          cache: pnpm

      - name: Install vcpkg host dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build git curl zip unzip tar pkg-config clang libclang-dev nasm libssl-dev

      - name: Install vcpkg host dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja pkg-config nasm openssl@3

      - name: Enable MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}

      - name: Install LLVM (Windows, bindgen / ffmpeg-sys)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2.0.7
        with:
          version: '19.1.7'
          arch: ${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:LLVM_PATH) { throw 'LLVM_PATH missing after install-llvm-action' }
          $llvmBin = Join-Path $env:LLVM_PATH 'bin'
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PATH=$llvmBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Resolve VCPKG_ROOT (Unix)
        if: runner.os != 'Windows'
        id: vcpkg_unix_root
        shell: bash
        run: |
          R="${HOME}/vcpkg"
          echo "root=$R" >> "$GITHUB_OUTPUT"
          echo "VCPKG_ROOT=$R" >> "$GITHUB_ENV"

      - name: Resolve VCPKG_ROOT (Windows)
        if: runner.os == 'Windows'
        id: vcpkg_win_root
        shell: pwsh
        run: |
          $r = Join-Path $env:USERPROFILE 'vcpkg'
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$r"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "root=$r"

      - name: Restore vcpkg (Unix)
        if: runner.os != 'Windows'
        id: vcpkg_cache_unix
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.vcpkg_unix_root.outputs.root }}
          key: vcpkg-ff81-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_TAG }}
          restore-keys: |
            vcpkg-ff81-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Restore vcpkg (Windows)
        if: runner.os == 'Windows'
        id: vcpkg_cache_win
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.vcpkg_win_root.outputs.root }}
          key: vcpkg-ff81-Windows-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_TAG }}
          restore-keys: |
            vcpkg-ff81-Windows-${{ matrix.vcpkg_triplet }}-

      - name: Setup vcpkg + static FFmpeg (Unix)
        if: runner.os != 'Windows'
        run: node scripts/setup-vcpkg-ffmpeg.ts ${{ matrix.vcpkg_triplet }}

      - name: Setup vcpkg + static FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: node scripts/setup-vcpkg-ffmpeg.ts ${{ matrix.vcpkg_triplet }}

      - name: Save vcpkg (Unix)
        if: success() && runner.os != 'Windows' && steps.vcpkg_cache_unix.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.vcpkg_unix_root.outputs.root }}
          key: vcpkg-ff81-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_TAG }}

      - name: Save vcpkg (Windows)
        if: success() && runner.os == 'Windows' && steps.vcpkg_cache_win.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.vcpkg_win_root.outputs.root }}
          key: vcpkg-ff81-Windows-${{ matrix.vcpkg_triplet }}-${{ env.VCPKG_TAG }}

      - name: Log FFmpeg (pkg-config, Unix)
        if: runner.os != 'Windows'
        run: |
          "$PKG_CONFIG" --modversion libavcodec
          "$PKG_CONFIG" --modversion libavformat

      - name: Log FFmpeg (pkg-config, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & $env:PKG_CONFIG --modversion libavcodec
          & $env:PKG_CONFIG --modversion libavformat

      - name: Assert FFmpeg binding compatibility
        run: node scripts/assert-ffmpeg-version.ts

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/adapters/src/node -> target

      - run: pnpm install --frozen-lockfile

      - name: Build native module
        run: pnpm --filter "@hls-downloader/adapters" run build:native

      - name: Upload native binaries
        uses: actions/upload-artifact@v4
        with:
          name: adapters-native-${{ matrix.name }}
          path: packages/adapters/src/node/native.*.node
          if-no-files-found: error

  publish-rust-native:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
    needs: build-adapters-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          pattern: adapters-native-*
          merge-multiple: true
          path: packages/adapters/src/node

      - name: Prepare native platform packages
        run: |
          pnpm --filter "@hls-downloader/adapters" exec napi create-npm-dirs --cwd src/node
          pnpm --filter "@hls-downloader/adapters" exec napi artifacts --cwd src/node --output-dir . --npm-dir npm
          pnpm --filter "@hls-downloader/adapters" exec napi pre-publish --cwd src/node --skip-optional-publish -t npm
          pnpm run adapters:inject-native-pkg-repository

      - name: Publish native platform packages
        run: |
          set -euo pipefail
          VER=$(node -p "require('./packages/adapters/package.json').version")
          TAG=$(node scripts/npm-dist-tag.ts)
          PUBLISH_EXTRA=()
          if [[ -n "$TAG" ]]; then
            PUBLISH_EXTRA=(--tag "$TAG")
            echo "Prerelease version ${VER}: publishing with --tag ${TAG}"
          fi
          for pkg in packages/adapters/src/node/npm/*; do
            if ! ls "${pkg}"/*.node >/dev/null 2>&1; then
              echo "Skip ${pkg} (no .node artifact)"
              continue
            fi
            echo "Publishing ${pkg}"
            (cd "${pkg}" && pnpm publish --provenance --access public --no-git-checks "${PUBLISH_EXTRA[@]}")
          done

  publish:
    needs: publish-rust-native
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.publish_scope == 'root-only') || needs.publish-rust-native.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FFMPEG_LIBAVCODEC_MIN_MAJOR: '60'
      FFMPEG_LIBAVCODEC_MAX_MAJOR: '62'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Check Node.js (≥24.12.0)
        id: node_check
        shell: bash
        run: |
          set -euo pipefail
          export MIN="24.12.0"
          if ! command -v node &>/dev/null; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export VER="$(node -p "process.version.slice(1).split('-')[0].split('+')[0]")"
          if node -e "const cur=process.env.VER.split('.').map(s=>parseInt(s,10));const min=process.env.MIN.split('.').map(Number);const ge=cur[0]>min[0]||(cur[0]===min[0]&&cur[1]>min[1])||(cur[0]===min[0]&&cur[1]===min[1]&&(cur[2]||0)>=(min[2]||0));process.exit(ge?0:1);"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok != 'true'
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - uses: actions/setup-node@v4
        if: steps.node_check.outputs.ok == 'true'
        with:
          node-version: ${{ steps.node_check.outputs.version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Log toolchain versions (Node built-in npm)
        run: |
          echo "Trusted Publishing needs npm >= 11.5.1; Node bundles npm 10.x — expect e.g. 10.9.4 here until upgrade step below."
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"

      - name: Install vcpkg host dependencies (Linux)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build git curl zip unzip tar pkg-config clang libclang-dev nasm libssl-dev

      # actions/cache does not expand ~ reliably; path must match Node os.homedir()/vcpkg.
      - name: Resolve VCPKG_ROOT (Linux)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        id: vcpkg_root
        shell: bash
        run: |
          R="${HOME}/vcpkg"
          echo "root=$R" >> "$GITHUB_OUTPUT"
          echo "VCPKG_ROOT=$R" >> "$GITHUB_ENV"

      - name: Restore vcpkg (Linux)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        id: vcpkg_cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.vcpkg_root.outputs.root }}
          key: vcpkg-ff81-Linux-x64-linux-${{ env.VCPKG_TAG }}
          restore-keys: |
            vcpkg-ff81-Linux-x64-linux-

      - name: Setup vcpkg + static FFmpeg (Linux x64)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        run: node scripts/setup-vcpkg-ffmpeg.ts x64-linux

      - name: Save vcpkg (Linux)
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all') && steps.vcpkg_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.vcpkg_root.outputs.root }}
          key: vcpkg-ff81-Linux-x64-linux-${{ env.VCPKG_TAG }}

      - name: Log FFmpeg (pkg-config)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        run: |
          "$PKG_CONFIG" --modversion libavcodec
          "$PKG_CONFIG" --modversion libavformat

      - name: Assert FFmpeg binding compatibility
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        run: node scripts/assert-ffmpeg-version.ts

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        with:
          workspaces: packages/adapters/src/node -> target

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        run: pnpm run build

      - name: Build root package
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_scope == 'root-only' }}
        run: pnpm run build:root

      - name: Run publish e2e tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        run: pnpm run test:e2e:publish

      - name: Inject adapters optional native dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        run: pnpm run adapters:inject-optional-deps

      - name: Log toolchain versions before publish
        run: |
          echo "After npm install -g — this must be >= 11.5.1 for OIDC:"
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          echo "pnpm $(pnpm -v)"
          echo "npm path: $(command -v npm)"

      - name: Publish packages
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_scope == 'all' }}
        run: |
          set -euo pipefail
          VER=$(node -p "require('./packages/adapters/package.json').version")
          TAG=$(node scripts/npm-dist-tag.ts)
          PUBLISH_EXTRA=()
          if [[ -n "$TAG" ]]; then
            PUBLISH_EXTRA=(--tag "$TAG")
            echo "Prerelease version ${VER}: publishing with --tag ${TAG}"
          fi
          pnpm --filter "@hls-downloader/shared" publish --provenance --no-git-checks --ignore-scripts "${PUBLISH_EXTRA[@]}"
          pnpm --filter "@hls-downloader/core" publish --provenance --no-git-checks --ignore-scripts "${PUBLISH_EXTRA[@]}"
          pnpm --filter "@hls-downloader/adapters" publish --provenance --no-git-checks --ignore-scripts "${PUBLISH_EXTRA[@]}"
          pnpm publish --provenance --no-git-checks --ignore-scripts "${PUBLISH_EXTRA[@]}"

      - name: Publish root package
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_scope == 'root-only' }}
        run: |
          set -euo pipefail
          VER=$(node -p "require('./package.json').version")
          TAG=$(node scripts/npm-dist-tag.ts)
          PUBLISH_EXTRA=()
          if [[ -n "$TAG" ]]; then
            PUBLISH_EXTRA=(--tag "$TAG")
            echo "Prerelease version ${VER}: publishing with --tag ${TAG}"
          fi
          pnpm publish --provenance --no-git-checks --ignore-scripts "${PUBLISH_EXTRA[@]}"
