[package]
name = "hls-core"
version = "0.1.0"
edition = "2024"

[features]
default = []
# CI / 发布流水线开启：静态链接 vcpkg FFmpeg，.node 不依赖用户机 libav*
static-ffmpeg = ["ffmpeg-next/static"]

[dependencies]
ffmpeg-next = { version = "8.1.0" }
reqwest = { version = "0.12", features = ["rustls-tls", "stream"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util"] }
m3u8-rs = "6"
tempfile = "3"
base64 = "0.22"
futures = "0.3"
thiserror = "2"
url = "2"
mpeg2ts-reader = "0.18"
muxide = "0.2"
