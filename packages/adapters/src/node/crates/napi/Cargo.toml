[package]
name = "hls-napi"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[lib]
crate-type = ["cdylib"]

[features]
default = []
static-ffmpeg = ["hls-core/static-ffmpeg"]

[dependencies]
hls-core = { path = "../core" }
napi = { version = "3", features = ["napi9", "async", "tokio_rt"] }
napi-derive = "3"
base64 = "0.22"
tokio = { version = "1", features = ["io-util", "rt"] }
dashmap = "6"
tokio-util = { version = "0.7", features = ["rt"] }
uuid = { version = "1", features = ["v4"] }

[build-dependencies]
napi-build = "2"
