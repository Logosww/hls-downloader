[package]
name = "hls-core"
version = "0.1.0"
edition = "2024"

[dependencies]
# static：链接静态 FFmpeg，发布的 .node 不再依赖用户机上的 libavcodec 等动态库
ffmpeg-next = { version = "8.1.0", features = ["static"] }
reqwest = { version = "0.12", features = ["rustls-tls"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs"] }
m3u8-rs = "6"
tempfile = "3"
base64 = "0.22"
futures = "0.3"
thiserror = "2"
url = "2"
