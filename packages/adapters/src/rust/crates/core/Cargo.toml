[package]
name = "hls-core"
version = "0.1.0"
edition = "2024"

[dependencies]
ffmpeg-next = "8.1.0"
reqwest = { version = "0.12", features = ["rustls-tls"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs"] }
m3u8-rs = "6"
tempfile = "3"
base64 = "0.22"
futures = "0.3"
thiserror = "2"
url = "2"
