[package]
name = "hls-transmux-browser-wasm"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
hls-transmux = { version = "0.2", default-features = false }
wasm-bindgen = "=0.2.100"
wasm-bindgen-futures = "=0.4.50"
js-sys = "=0.3.77"
console_error_panic_hook = "0.1"
tokio = { version = "1", default-features = false, features = ["io-util", "macros", "sync", "rt"] }
url = "2"
getrandom = { version = "0.2", features = ["js"] }
